<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes">
    <title>CertiVerify</title>
    <script src="https://unpkg.com/@webcomponents/webcomponentsjs@2.8.0/webcomponents-loader.js"></script>
    <script type="module" src="../dist/main.js"></script>
      // HACK(keanulee): The Redux package assumes `process` exists - mock it here before the module is loaded.
      window.process = { env: { NODE_ENV: 'development' } };
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0F172A;
        --card-bg: rgba(30, 41, 59, 0.8);
        --text-main: #F8FAFC;
        --border-color: rgba(255, 255, 255, 0.1);
      }
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: var(--bg-color);
        background-image: 
          radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0px, transparent 50%);
        background-attachment: fixed;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px 20px;
        box-sizing: border-box;
      }
      .header {
        text-align: center;
        margin-bottom: 40px;
      }
      h1 {
        font-size: 3rem;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(135deg, #60A5FA, #A78BFA);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
      }
      .verifier-container {
        width: 100%;
        max-width: 800px;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      @media (max-width: 768px) {
        .verifier-container {
            padding: 20px;
        }
        h1 {
            font-size: 2.2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>CertiVerify</h1>
    </div>
    <div class="verifier-container">
      <blockcerts-verifier theme="dark"></blockcerts-verifier>
    </div>
  </body>
</html>
